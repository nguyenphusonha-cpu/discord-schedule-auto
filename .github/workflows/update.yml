name: Update NEXT ID

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Update Discord Message
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MESSAGE_ID: ${{ secrets.MESSAGE_ID }}
        run: |
          NOW=$(date +%s)

          TEASER=$((NOW+86400))
          TRAILER=$((NOW+259200))
          KIT=$((NOW+432000))
          DROP=$((NOW+604800))

          CONTENT=$(printf "**NEXT ID**\n\nID Teaser → <t:%s:F>\nID Trailer → <t:%s:F>\nID Kit → <t:%s:F>\nID Drop → <t:%s:F>\n\nNOTICE: Delays can and has happened, can go from 10 minutes to an hour." \
          "$TEASER" "$TRAILER" "$KIT" "$DROP")

          curl -X PATCH \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$CONTENT\"}" \
            https://discord.com/api/v10/channels/$CHANNEL_ID/messages/$MESSAGE_ID
