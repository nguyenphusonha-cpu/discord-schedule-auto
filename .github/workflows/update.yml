name: Update Discord Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */14 * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Send updated schedule
        run: |
          NOW=$(date +%s)

          TEASER=$((NOW + 86400))
          TRAILER=$((NOW + 259200))
          KIT=$((NOW + 432000))
          DROP=$((NOW + 604800))

          MESSAGE="**NEXT ID**

ID Teaser → <t:$TEASER:F>
ID Trailer → <t:$TRAILER:F>
ID Kit → <t:$KIT:F>
ID Drop → <t:$DROP:F>"

          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"$MESSAGE\"}" \
          "${{ secrets.WEBHOOK_URL }}"
